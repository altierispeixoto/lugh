# Enable Ruff's default rules plus additional ones
lint.select = [
    "ALL",
    "ASYNC",
    "B",
    "C4",
    "DTZ",
    "EM",
    "ERA",
    "INT",
    "NPY",
    "PD",
    "PT",
    "RUF",
    "S",
    "SIM",
    "SLOT",
]

lint.ignore = [
    "D100",
    "D104",
    "D203",
    "D212",
    "E501",
    "PLR0913",
    "PD901",
    "S101",
]

lint.fixable = ["ALL"]
lint.unfixable = []

exclude = [
    ".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg",
    ".mypy_cache", ".nox", ".pants.d", ".pytype", ".ruff_cache",
    ".svn", ".tox", ".venv", "__pypackages__", "_build",
    "buck-out", "build", "dist", "node_modules", "venv",
]

line-length = 120
lint.dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
target-version = "py312"

[lint.per-file-ignores]
"tests/**/*" = ["S101", "TID252"]

[lint.mccabe]
max-complexity = 10

[lint.pycodestyle]
max-doc-length = 120

[lint.pydocstyle]
convention = "google"

[lint.isort]
force-single-line = true
combine-as-imports = true
known-first-party = ["__PACKAGE__"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Body"]

[lint.pyupgrade]
keep-runtime-typing = true

[lint.pylint]
max-args = 8

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
